<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>PTE DI Data Reading Practice</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://www.pearsonpte.com.cn/favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 PTE DI 数据跟读练习</h1>
        </header>

        <div class="info-bar">
            <span>进度: <span id="progress">1/50</span></span>
            <span>计时: <span id="timer-display">00:00</span></span>
        </div>

        <main>
            <div class="data-card">
                <div id="data-figure" class="data-figure">0</div>

                <div class="speak-area">
                    <button id="speak-btn" class="speak-btn">🔊</button>
                </div>

                <div class="button-group">
                    <button id="action-btn" class="action-btn">下一个</button>
                </div>

                <div id="message" class="message"></div>
            </div>
        </main>

        <footer class="footer">
            <p>Designed & Developed By <span>Jimmy Wu</span> © 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
